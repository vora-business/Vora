<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Vora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
 
<!-- Floating Header -->
<header class="fixed top-0 left-0 w-full bg-white shadow z-50 flex items-center justify-between p-4">
    <a href="home.html" class="text-xl font-bold">Vora</a>
    <nav class="hidden md:flex space-x-4 items-center">
    </nav>
</header> 

<!-- Side Menu -->
<div id="sideMenu" class="fixed top-0 left-0 h-full w-72 bg-white shadow transform -translate-x-full transition-transform z-50 overflow-y-auto">
    <button id="closeMenu" class="p-4 text-xl">✕</button>
    <div class="p-4 space-y-4">
    </div>
</div>

<!-- Main Content -->
<main class="pt-24 pb-8 flex items-center justify-center min-h-screen">
    <div class="text-center max-w-md px-4">
        <!-- 404 Error Code -->
        <div class="mb-8">
            <h1 class="text-9xl font-bold text-red-600">404</h1>
        </div>

        <!-- Error Message -->
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Page Not Found</h2>
            <p class="text-gray-600 text-lg mb-6">
                Sorry, the page you're looking for doesn't exist, has been moved, or you don't have permission to access it.
            </p>
        </div>

        <!-- Illustration -->
        <div class="mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 h-32 mx-auto text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="home.html" 
               class="px-8 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
                Go to Home
            </a>
            <a href="browse.html" 
               class="px-8 py-3 bg-gray-300 text-gray-800 font-semibold rounded-lg hover:bg-gray-400 transition">
                Browse Services
            </a>
        </div>

        <!-- Contact Support -->
        <div class="mt-12 pt-8 border-t border-gray-300">
            <p class="text-gray-600 text-sm">
                Need help? <a href="https://wa.me/2347079142078" target="_blank" class="text-blue-600 hover:underline">Contact support</a>
            </p>
        </div>
    </div>
</main>

<script src="menu.js"></script>
<script src="404.js"></script>
<script type="module">
  import { supabase } from './supabase.js'

  console.log(supabase)
</script>

</body>
</html>
