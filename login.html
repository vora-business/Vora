<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vora | Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css"> 
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center relative">
  <!-- Modal Overlay -->
  <div class="fixed inset-0 bg-black bg-opacity-40 z-10"></div>

  <!-- Modal Card -->
  <main class="z-20 fixed inset-0 flex items-center justify-center overflow-auto">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 relative animate-fadeIn my-8 overflow-y-auto max-h-[95vh]">
      <!-- Logo/Header --> 
      <div class="flex flex-col items-center mb-6">
        <img src="/favicon.ico" alt="Vora Logo" class="w-12 h-12 mb-2 rounded-full shadow" onerror="this.style.display='none'">
        <h1 class="text-2xl font-bold text-gray-900 mb-1">Sign in to Vora</h1>
        <p class="text-gray-500 text-sm">Welcome back! Please enter your details.</p>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-2 mb-6">
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Error Alert -->
      <div id="errorAlert" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
        <p id="errorMessage" class="text-red-700 text-sm font-medium"></p>
      </div>

      <!-- Success Alert -->
      <div id="successAlert" class="hidden mb-4 p-3 bg-green-50 border border-green-200 rounded-lg">
        <p id="successMessage" class="text-green-700 text-sm font-medium"></p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" placeholder="you@example.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" required>
          <p id="emailError" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input id="password" type="password" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" required>
            <button type="button" id="togglePassword" class="absolute right-3 top-3 text-gray-500 hover:text-gray-700 focus:outline-none">'👁️'</button>
          </div>
          <p id="passwordError" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>
        <button id="loginBtn" type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition flex items-center justify-center gap-2" disabled>
          <span id="buttonText">Sign In</span>
          <span id="spinner" class="hidden">
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
        </button>
      </form>

      <div class="mt-6 text-center text-gray-600 text-sm">
        Don't have an account? <a href="register.html" class="text-blue-600 font-semibold hover:underline">Sign up</a>
      </div>
    </div>
  </main>

<script src="./loading-utils.js" type="module"></script>
<script type="module" src="./login.js"></script>
<script src="./menu.js" type="module"></script>

</html>
