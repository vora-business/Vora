<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vora Chat</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    #chatBox::-webkit-scrollbar {
      width: 5px;
    }

    #chatBox::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
  </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col">

  <!-- HEADER -->
  <div class="bg-blue-600 text-white p-4 shadow-md">
    <h1 class="text-xl font-bold">Vora Chat</h1>
    <p class="text-sm opacity-80">Customer & Provider Messaging</p>
  </div>

  <div id="chat-context-header" class="bg-white border-b border-gray-200 p-4 z-10">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <button id="backBtn" type="button" onclick="window.history.back()"
        class="text-blue-600 hover:text-blue-800 font-semibold">
        ← Back
       </button>
             <h2 id="service-title" class="text-lg font-bold text-center text-gray-800">Loading...</h2>
             <p id="other-user-name" class="text-sm text-gray-500 text-center"></p>
        </div>

  <!-- CHAT AREA -->
  <div
    id="chatBox"
    class="flex-1 overflow-y-auto p-4 space-y-3"
  ></div>

  <!-- INPUT AREA -->
  <div class="bg-white border-t p-3 flex gap-2">

    <input
      type="text"
      id="messageInput"
      placeholder="Type a message..."
      class="flex-1 border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
    />

    <button
      id="sendBtn"
      class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold transition"
    >
      Send
    </button>

  </div>

    <script src="./auth.js" type="module"></script>
    <script src="./chat.js" type="module"></script>
    <script src="./menu.js" type="module"></script>
    <script src="./main.js" type="module"></script>
    <script src="./notifications.js" type="module"></script>
    <script src="./notification-service.js" type="module"></script>
    <script src="./notification-badge.js" type="module"></script>
<script type="module">
  import { supabase } from './supabase.js'

  console.log(supabase)
</script>

</body>
</html>
