<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Messages | Vora</title>
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/favicon-192.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50">

<!-- ================= HEADER ================= -->
<header class="fixed top-0 left-0 w-full bg-white border-b border-gray-200 z-50">

  <div class="max-w-7xl mx-auto px-4">

    <div class="flex items-center justify-between h-16">

      <!-- LEFT -->
      <div class="flex items-center gap-10">
        
        <a href="home.html" class="flex items-center gap-2">
          <img src="/vora-logo.png" alt="Vora Logo" class="h-10 w-auto" onerror="this.style.display='none'">
          <span class="text-2xl font-extrabold text-blue-600">Vora</span>
        </a>

        </nav>

      </div>

      <!-- RIGHT -->
      <div class="flex items-center gap-4">

        <!-- PROFILE -->
        <a href="profile.html"
          data-profile-icon="true"
          class="w-10 h-10 rounded-full bg-gray-300
          flex items-center justify-center
          hover:bg-gray-400 transition">

          👤

        </a>

        <!-- LOGOUT -->
        <button id="logoutBtn"
          class="hidden lg:block text-red-600 font-semibold hover:text-red-800 transition">
          Logout
        </button>


      </div>

    </div>

  </div>

</header>


  </div>

  </div>

</div>

<!-- ================= OVERLAY ================= -->
<div id="menuOverlay"
  class="hidden fixed inset-0 bg-black bg-opacity-40 z-40 lg:hidden">
</div>

<!-- ================= MAIN CONTENT ================= -->
<main class="pt-24 px-4 max-w-5xl mx-auto pb-8">

  <!-- HEADER -->
  <div class="mb-8">
        <button id="backBtn" type="button" onclick="window.history.back()"
          class="text-blue-600 hover:text-blue-800 font-semibold">
          ← Back
        </button>
    <h1 class="text-3xl font-bold text-gray-900">My Messages</h1>
    <p class="text-gray-600 mt-2">View all your conversations with providers and customers</p>
  </div>

  <!-- MESSAGES CONTAINER -->
  <div id="messagesContainer" class="space-y-3">
    <div class="bg-white rounded-xl p-6 text-center shadow">
      <div class="text-5xl mb-4">⏳</div>
      <p class="text-gray-600 text-lg">Loading messages...</p>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <div id="emptyState" class="hidden bg-white rounded-xl p-10 text-center shadow">
    <div class="text-6xl mb-4">💬</div>
    <h2 class="text-2xl font-bold text-gray-800 mb-3">No Messages Yet</h2>
    <p class="text-gray-500 mb-6">Start a conversation by booking a service or responding to provider offers</p>
    <a href="browse.html" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
      Browse Services
    </a>
  </div>

</main>

<!-- ================= SCRIPTS ================= -->
<script src="./menu.js" type="module"></script>
<script src="./loading-utils.js" type="module"></script>
<script src="./auth.js" type="module"></script>
<script src="./my-messages.js" type="module"></script>
<script src="./message-realtime-service.js" type="module"></script>
<script src="./notifications.js" type="module"></script>
<script src="./notification-service.js" type="module"></script>
<script src="./notification-badge.js" type="module"></script>
<script src="./supabase.js" type="module"></script>
 
</body>
</html>
