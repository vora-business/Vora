<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Service | Vora</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">

    <header class="fixed top-0 left-0 w-full bg-white shadow z-50 flex items-center justify-between p-4">
        <h1 class="text-xl font-bold">
           <a href="home.html" class="flex items-center gap-2">
          <img src="/vora-logo.png" alt="Vora Logo" class="h-10 w-auto" onerror="this.style.display='none'">
          <span class="text-2xl font-extrabold text-blue-600">Vora</span>
        </a>
        </h1>
        <div class="md:hidden flex items-center gap-4">
            <a href="profile.html" data-profile-icon="true" class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center text-sm">👤</a>
        </div>
        <nav class="hidden md:flex space-x-4 items-center">
            <a href="profile.html" data-profile-icon="true" class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center text-sm">👤</a>
        </nav>
    </header>
 
            <!-- Main -->

    <main class="pt-24 max-w-4xl mx-auto py-12 px-4">
        <div class="mb-6 flex items-center gap-4">
                          <!-- BACK BUTTON -->
        <button id="backBtn" type="button" onclick="window.history.back()"
          class="text-blue-600 hover:text-blue-800 font-semibold">
          ← Back
        </button>
            <h1 class="text-3xl font-extrabold text-gray-900">Set up your business</h1>
        </div>
        <form id="add-service-form" class="bg-white p-8 rounded-lg shadow-lg space-y-6">
  
            <div>
                <label for="service-title" class="block text-sm font-medium text-gray-700">Service Title</label>
                <input type="text" id="service-title" name="service-title" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label for="service-description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea id="service-description" name="service-description" rows="4" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500"></textarea>
            </div>

            <div>
<label for="service-category" class="block text-sm font-medium text-gray-700">Category</label>

<select id="service-category" name="service-category" required
    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">

    <option value="">Select a category</option>
    <option value="Home Services">Home Services</option>
    <option value="Repairs & Maintenance">Repairs & Maintenance</option>
    <option value="Beauty & Personal Care">Beauty & Personal Care</option>
    <option value="Health & Medical">Health & Therapy</option>
    <option value="Fitness & Sports">Fitness & Sports</option>
    <option value="Food & Catering">Food & Catering</option>
    <option value="Education & Tutoring">Education & Tutoring</option>
    <option value="Photography & Videography">Photography & Videography</option>
    <option value="Media & Entertainment">Events & Event Services</option>
    <option value="Fashion & Apparel">Tailoring & Fashion Design</option>
    <option value="Art & Design">Art & Illustration</option>
</select>
            </div>

            <div>
                <label for="service-price" class="block text-sm font-medium text-gray-700">Price (NGN)</label>
                <input type="number" id="service-price" name="service-price" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label for="deal-message" class="block text-sm font-medium text-gray-700">Deal Headline <span class="text-gray-500">(Optional)</span></label>
                <input type="text" id="deal-message" name="deal-message" placeholder="e.g. Book 3 friends and each gets 20% off" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="group-discount-threshold" class="block text-sm font-medium text-gray-700">Group size for discount</label>
                    <input type="number" id="group-discount-threshold" name="group-discount-threshold" min="2" placeholder="e.g. 3" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label for="group-discount-percent" class="block text-sm font-medium text-gray-700">Discount percent</label>
                    <input type="number" id="group-discount-percent" name="group-discount-percent" min="1" max="100" placeholder="e.g. 20" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>

            <div>
                <label for="service-location" class="block text-sm font-medium text-gray-700">Location</label>
                <input type="text" id="service-location" name="service-location" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" placeholder="e.g., 15 Admiralty Way, Lekki Phase 1, Lagos, Nigeria">
            </div>

            <div>
                <label for="travel-price" class="block text-sm font-medium text-gray-700">Travel Price (NGN) <span class="text-gray-500">(Optional - charge if you travel to customer)</span></label>
                <input type="number" id="travel-price" name="travel-price" placeholder="e.g., 2000" min="0" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label for="service-image" class="block text-sm font-medium text-gray-700">Service Image <span class="text-red-500">*</span></label>
                <div class="mt-1 flex flex-col">
                    <input type="file" id="service-image" name="service-image" accept="image/*" required class="block px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    <p class="text-xs text-gray-500 mt-2">JPG, PNG, or WebP. Max 10MB - <span class="text-red-500 font-semibold">Required</span></p>
                    <div id="image-preview" class="mt-4 hidden">
                        <img id="preview-img" src="" alt="Preview" class="h-32 w-32 object-cover rounded-md border border-gray-300">
                        <button type="button" id="remove-image-btn" class="mt-2 text-sm text-red-600 hover:text-red-800 font-medium">Remove Image</button>
                    </div>
                </div>
            </div>

            <div class="flex justify-end">
                <button type="submit" id="submit-btn" class="py-3 px-8 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Add Service</button>
            </div>
        </form>
    </main>

    <script src="./add-service.js" type="module"></script>
    <script src="./auth.js" type="module"></script>
    <script src="./menu.js" type="module"></script>
    <script src="./main.js" type="module"></script>
    <script src="./notifications.js" type="module"></script>
    <script src="./notification-service.js" type="module"></script>

</html>
